<!doctype html>
<html lang="en">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saint Benedict Medallion</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- bootstrap popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" type="text/css" href="customize-style.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>

  </head>
  <body class="font-monospace">

    <nav class="navbar navbar-expand-sm bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold" style="color: hsl(350, 90%, 49%);"><strong>SBM</strong></span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" id="back" aria-current="page" href="#">Back &gt;</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid" style="background-image: url('images/bg.gif'); background-repeat: no-repeat; background-attachment: fixed; background-size: cover;">
      <div class="containers">
          <section class="tools-board">
            <div class="rows">
              <label class="title">Shapes</label>
              <ul class="options">
                <li class="option tool" id="rectangle">
                  <img src="icons/rectangle.svg" alt="">
                  <span>Rectangle</span>
                </li>
                <li class="option tool" id="circle">
                  <img src="icons/circle.svg" alt="">
                  <span>Circle</span>
                </li>
              </ul>
            </div>
            <div class="rows">
              <label class="title">Options</label>
              <ul class="options">
                <li class="option active tool" id="draw">
                  <img src="icons/brush.svg" alt="">
                  <span>Free Draw</span>
                </li>
                <li class="option tool" id="text">
                  <img src="icons/text.png" width="21px" class="m-0 p-0" alt="">
                  <span>Text</span>
                </li>
                <li class="option tool" id="remove" disabled="disabled">
                  <img src="icons/eraser.svg" alt="">
                  <span>Eraser</span>
                </li>
              </ul>
            </div>
            <div class="rows buttons">
              <button class="done-img">Done</button>
              <button class="upload-img">Upload Image</button>
            </div>
          </section>
          <section class="drawing-board">
            <canvas id="canvas"></canvas>
          </section>
      </div>
    </div>

    <div class="container-fluid bg-dark text-light text-center py-3" style="font-size: 0.75rem;">
      <div class="row p-2">
        <p>All rights reserved © 2023 <a href="#" class="text-reset text-decoration-none">SBM</a></p>
        <p>Designed by <a href="#" class="text-reset text-decoration-none">MVB</a></p>
      </div>
      <div class="row p-2">
        <div class="col">Our Social Media: <a href="#"><i class="fab fa-facebook fa-lg"></i></a></i></div>
      </div>
      <div class="row p-2">
        <a href="#" class="text-reset text-decoration-none">Privacy Policy</a>
        <a href="#" class="text-reset text-decoration-none">Terms of Service</a>
      </div>
    </div>

    <!-- jquery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.1/dist/jquery.min.js"></script>
    <!-- fabric -->
    <script src="https://cdn.jsdelivr.net/npm/fabric@5.2.4/dist/fabric.min.js"></script>
    <!-- custome js -->
    <script src="customize-script.js"></script>
    <script>
      canvas.setHeight(document.body.scrollHeight);
      canvas.setWidth(document.body.scrollHeight);
      canvas.setBackgroundImage("images/heart.png", canvas.renderAll.bind(canvas));
    </script>
  </body>
</html>
