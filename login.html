<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE-edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saint Benedict Medallion</title>
  <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="stylesheet" href="login/style.css">
  
</head>

<body>
	<div id="fb-root"></div>
	<script>
	window.fbAsyncInit = function () {
	  FB.init({
	    appId: '1539981083195876',
	    status: true,
	    cookie: true,
	    xfbml: true
	  });
	};

	(function (doc) {
	  var js;
	  var id = 'facebook-jssdk';
	  var ref = doc.getElementsByTagName('script')[0];
	  if (doc.getElementById(id)) {
	    return;
	  }
	  js = doc.createElement('script');
	  js.id = id;
	  js.async = true;
	  js.src = "//connect.facebook.net/en_US/all.js";
	  ref.parentNode.insertBefore(js, ref);
	}(document));

	function Login() {
	  FB.login(function (response) {
	    if (response.authResponse) {
	      FB.api('/me', function (response) {
          document.getElementById("displayName").innerHTML = response.name;
          document.getElementById("userName").innerHTML = response.username;
          document.getElementById("userID").innerHTML = response.id;
          document.getElementById("userEmail").innerHTML = response.email;
          FB.api('/me/picture?type=normal', function (response) {
            document.getElementById("profileImage").setAttribute("src", response.data.url);
          });
        });
	    } else {
	      alert("Login attempt failed!");
	    }
	  }, {scope: 'email,user_photos,publish_actions'});
	}

	FB.Event.subscribe('auth.authResponseChange', function (response) {
	  if (response.status === 'connected') {
	    alert("Successfully connected to Facebook!");
	  }
	  else if (response.status === 'not_authorized') {
	    alert("Login failed!");
	  } else {
	    alert("Unknown error!");
	  }
	});
	</script>
	<input type="button" value="Login" onclick="Login();" />
</body>

</html>
