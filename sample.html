		<div class="sec">
			<div class="d-flex justify-content-center p-5">
				<div class="container rounded p-3">
					<div class="container-fluid my-4">
					    <div class="container-fluid d-flex justify-content-center align-items-center">
					      	<ul class="nav nav-underline pb-2" id="myTab" role="tablist">
						    	<li class="nav-item" role="presentation">
						      	    <a class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all-tab-pane" role="tab" aria-controls="all-tab-pane" aria-selected="true" aria-current="page" href="#">Login</a>
						      	</li>
						      	<li class="nav-item">
						      	    <a class="nav-link" id="customize-tab" data-bs-toggle="tab" data-bs-target="#customize-tab-pane" role="tab" aria-controls="customize-tab-pane" aria-selected="false"href="#">Register</a>
						      	</li>
					      	</ul>
					    </div>
					    <div class="container-fluid">
					    	<div class="tab-content" id="myTabContent">
					    	  	<div class="tab-pane fade show active" id="all-tab-pane" role="tabpanel" aria-labelledby="all-tab" tabindex="0">
					    	  		<div class="container-fluid">
					    	  			<form>
						    	  			<!-- Email input -->
						    	  			<div class="form-outline my-4">
						    	  			    <input type="text" placeholder="Enter your email" class="form-control rounded-0" required><i class="uil uil-envelope icon"></i>
						    	  			</div>

						    	  			<!-- Password input -->
						    	  			<div class="form-outline mb-4">
						    	  			    <input type="password" class="form-control rounded-0" placeholder="Enter your password" class="form-control" required><i class="uil uil-lock icon"></i><i class="uil uil-eye-slash showHidePw"></i>
						    	  			</div>

						    	  			<!-- 2 column grid layout -->
						    	  			<div class="row row-cols-auto">
						    	  			    <div class="col d-flex justify-content-center">
							    	  			    <!-- Checkbox -->
							    	  			    <div class="form-check mb-3">
							    	  			        <input class="form-check-input" type="checkbox" id="loginCheck" checked />
							    	  			        <label class="form-check-label" for="loginCheck"> Remember me </label>
							    	  			    </div>
						    	  			    </div>
						    	  			    <div class="col">
						    	  			    	<a href="#">Forgot password?</a>
						    	  			    </div>
						    	  			</div>

						    	  			<!-- Submit button -->
						    	  			<div class="d-flex justify-content-center">
						    	  			  	<button type="submit" class="btn btn-primary mb-3 w-100 rounded-pill">Sign in</button>
						    	  			</div>

						    	  			<!-- Register buttons -->
						    	  			<div class="text-center">
						    	  			    <p>Not a member? <a href="#!">Register</a></p>
						    	  			</div>
					    	  			</form>
					    	  		</div>
					    	  	</div>
					    	  	<div class="tab-pane fade" id="customize-tab-pane" role="tabpanel" aria-labelledby="customize-tab" tabindex="0">
				    	  			<div class="container-fluid">
			    	  				    <form>
			    	  					    <!-- Email input -->
			    	  					    <div class="form-outline mb-4">
			    	  					    	<input type="email" placeholder="Enter your email" class="form-control rounded-0" required><i class="uil uil-envelope icon"></i>
			    	  					    </div>

			    	  					    <!-- Password input -->
			    	  					    <div class="form-outline mb-4">
			    	  					    	<input type="password" class="form-control rounded-0" placeholder="Enter your password" class="form-control" required><i class="uil uil-lock icon"></i><i class="uil uil-eye-slash showHidePw"></i>
			    	  					    </div>

			    	  					    <!-- Repeat Password input -->
			    	  					    <div class="form-outline mb-4">
			    	  					        <input type="password" class="form-control rounded-0" placeholder="Repeat your password" class="form-control" required><i class="uil uil-lock icon"></i><i class="uil uil-eye-slash showHidePw"></i>
			    	  					    </div>

			    	  					    <!-- Checkbox -->
			    	  					    <div class="row row-cols-auto">
						    	  			    <div class="col d-flex justify-content-center">
							    	  			    <!-- Checkbox -->
							    	  			    <div class="form-check mb-3">
							    	  			        <input class="form-check-input" type="checkbox" id="loginCheck" checked />
							    	  			        <label class="form-check-label" for="loginCheck"> I have read and agree to the terms </label>
							    	  			    </div>
						    	  			    </div>
						    	  			</div>

						    	  			<!-- Submit button -->
						    	  			<div class="d-flex justify-content-center">
						    	  			  	<button type="submit" class="btn btn-primary mb-3 w-100 rounded-pill">Sign up</button>
						    	  			</div>

						    	  			<!-- Register buttons -->
						    	  			<div class="text-center">
						    	  			    <p>Already a member? <a href="#!">Login</a></p>
						    	  			</div>
			    	  				    </form>
				    	  			</div>
					    	  	</div>
					    	</div>
					    </div>
